<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad8)"/>
  <!-- Bottom person (on back) -->
  <rect x="130" y="140" width="140" height="80" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="125" r="25" fill="#f5c6a5"/>
  <!-- Top person (knee on belly) -->
  <rect x="185" y="145" width="50" height="65" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="220" cy="110" r="22" fill="#f5c6a5"/>
  <!-- Knee pressure indication -->
  <ellipse cx="200" cy="170" rx="20" ry="30" fill="#d4a574"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">KNEE ON BELLY</text>
</svg>