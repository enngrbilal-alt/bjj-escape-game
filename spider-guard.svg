<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad10)"/>
  <!-- Bottom person (spider guard) -->
  <rect x="140" y="155" width="120" height="65" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="140" r="25" fill="#f5c6a5"/>
  <!-- Extended legs with feet on biceps -->
  <line x1="170" y1="180" x2="180" y2="135" stroke="#f5c6a5" stroke-width="12" stroke-linecap="round"/>
  <line x1="230" y1="180" x2="220" y2="135" stroke="#f5c6a5" stroke-width="12" stroke-linecap="round"/>
  <!-- Top person (in spider guard) -->
  <rect x="170" y="120" width="60" height="55" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="200" cy="105" r="20" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">SPIDER GUARD</text>
</svg>