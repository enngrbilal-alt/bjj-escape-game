<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad2)"/>
  <!-- Bottom person (on back) -->
  <rect x="120" y="140" width="120" height="70" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="180" cy="125" r="25" fill="#f5c6a5"/>
  <!-- Top person (side control) -->
  <rect x="160" y="135" width="100" height="50" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="240" cy="140" r="22" fill="#f5c6a5"/>
  <ellipse cx="210" cy="160" rx="50" ry="25" fill="#d4a574"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">SIDE CONTROL</text>
</svg>