<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad9)"/>
  <!-- Bottom person (open guard on back) -->
  <rect x="140" y="150" width="120" height="70" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="135" r="25" fill="#f5c6a5"/>
  <!-- Open legs/feet on hips -->
  <ellipse cx="160" cy="170" rx="20" ry="35" fill="#f5c6a5" opacity="0.7" transform="rotate(-20 160 170)"/>
  <ellipse cx="240" cy="170" rx="20" ry="35" fill="#f5c6a5" opacity="0.7" transform="rotate(20 240 170)"/>
  <!-- Top person (standing in guard) -->
  <rect x="175" y="130" width="50" height="70" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="200" cy="110" r="20" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">OPEN GUARD</text>
</svg>