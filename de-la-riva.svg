<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad11)"/>
  <!-- Bottom person (DLR guard) -->
  <rect x="135" y="155" width="130" height="70" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="140" r="25" fill="#f5c6a5"/>
  <!-- Hook on leg -->
  <ellipse cx="215" cy="185" rx="18" ry="40" fill="#f5c6a5" opacity="0.8" transform="rotate(30 215 185)"/>
  <!-- Extended leg -->
  <line x1="170" y1="185" x2="180" y2="130" stroke="#f5c6a5" stroke-width="12" stroke-linecap="round"/>
  <!-- Top person (standing) -->
  <rect x="180" y="115" width="45" height="70" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="202" cy="100" r="20" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">DE LA RIVA</text>
</svg>