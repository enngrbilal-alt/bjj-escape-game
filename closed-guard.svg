<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad4)"/>
  <!-- Bottom person (guard player on back) -->
  <rect x="140" y="150" width="120" height="70" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="135" r="25" fill="#f5c6a5"/>
  <!-- Legs wrapped around -->
  <ellipse cx="180" cy="180" rx="30" ry="50" fill="#f5c6a5" opacity="0.8"/>
  <ellipse cx="220" cy="180" rx="30" ry="50" fill="#f5c6a5" opacity="0.8"/>
  <!-- Top person (in guard) -->
  <rect x="165" y="145" width="70" height="50" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="200" cy="125" r="20" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">CLOSED GUARD</text>
</svg>