<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad12)"/>
  <!-- Bottom person (SLX) -->
  <rect x="130" y="160" width="140" height="70" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="145" r="25" fill="#f5c6a5"/>
  <!-- X position on single leg -->
  <ellipse cx="210" cy="185" rx="20" ry="45" fill="#f5c6a5" opacity="0.8"/>
  <ellipse cx="190" cy="190" rx="15" ry="40" fill="#f5c6a5" opacity="0.8" transform="rotate(-15 190 190)"/>
  <!-- Top person (standing on one leg) -->
  <rect x="185" y="110" width="40" height="75" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="205" cy="95" r="20" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">SINGLE LEG X</text>
</svg>