<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad5)"/>
  <!-- Bottom person (turtle position) -->
  <ellipse cx="200" cy="180" rx="60" ry="40" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="160" r="25" fill="#f5c6a5"/>
  <!-- Arms and legs tucked -->
  <rect x="150" y="200" width="20" height="15" rx="5" fill="#f5c6a5"/>
  <rect x="230" y="200" width="20" height="15" rx="5" fill="#f5c6a5"/>
  <!-- Top person (attacking turtle) -->
  <rect x="180" y="140" width="60" height="40" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="220" cy="125" r="20" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">TURTLE</text>
</svg>