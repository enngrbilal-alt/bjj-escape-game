<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad)"/>
  <!-- Bottom person (on back) -->
  <ellipse cx="200" cy="180" rx="50" ry="30" fill="#d4a574"/>
  <rect x="150" y="150" width="100" height="80" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="130" r="25" fill="#f5c6a5"/>
  <!-- Top person (mount position) -->
  <ellipse cx="200" cy="150" rx="45" ry="25" fill="#d4a574"/>
  <rect x="155" y="120" width="90" height="60" rx="10" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="200" cy="100" r="22" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">MOUNT</text>
</svg>