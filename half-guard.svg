<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="matGrad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2647;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mat -->
  <rect width="400" height="300" fill="url(#matGrad7)"/>
  <!-- Bottom person (half guard on back) -->
  <rect x="140" y="145" width="120" height="75" rx="10" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <circle cx="200" cy="130" r="25" fill="#f5c6a5"/>
  <!-- One leg trapped -->
  <ellipse cx="210" cy="185" rx="25" ry="45" fill="#f5c6a5" opacity="0.9"/>
  <!-- Top person (passing half guard) -->
  <rect x="175" y="140" width="70" height="55" rx="8" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
  <circle cx="205" cy="125" r="20" fill="#f5c6a5"/>
  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">HALF GUARD</text>
</svg>